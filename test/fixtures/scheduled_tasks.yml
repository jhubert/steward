alice_daily_standup:
  workspace: default
  agent: jennifer
  conversation: alice_jennifer
  description: "Daily standup reminder: review goals and priorities for today"
  next_run_at: <%= 1.hour.from_now.iso8601 %>
  interval_seconds: 86400
  enabled: true
  last_run_at: <%= 1.day.ago.iso8601 %>
  metadata: {}

alice_one_time_reminder:
  workspace: default
  agent: jennifer
  conversation: alice_jennifer
  description: "Remind Alice about the board meeting preparation"
  next_run_at: <%= 2.hours.from_now.iso8601 %>
  interval_seconds:
  enabled: true
  last_run_at:
  metadata: {}

bob_disabled_task:
  workspace: default
  agent: jennifer
  conversation: bob_jennifer
  description: "Weekly report compilation"
  next_run_at: <%= 1.day.from_now.iso8601 %>
  interval_seconds: 604800
  enabled: false
  last_run_at: <%= 1.week.ago.iso8601 %>
  metadata: {}
